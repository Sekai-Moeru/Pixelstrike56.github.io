<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelstrike56 | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-main: #1f2328;
            --text-secondary: #636c76;
            --accent-color: #0969da;
            --btn-friend: #6c5ce7; /* Violet bleu */
            --border-color: #d0d7de;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --text-main: #c9d1d9;
                --text-secondary: #8b949e;
                --accent-color: #58a6ff;
                --btn-friend: #703cdd; /* Violet bleu plus clair pour le mode sombre */
                --border-color: #30363d;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: all 0.3s ease;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--border-color);
        }

        h1 { margin: 0.5rem 0; font-size: 1.8rem; }
        
        .bio {
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .badge {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-block;
            margin: 5px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:active { transform: scale(0.98); }

        .btn-config { background: var(--text-main); color: var(--card-bg); }
        .btn-friend { background: var(--btn-friend); color: white; }

        #config-details {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://github.com/pixelstrike56.png" alt="Pixelstrike56 Avatar" class="avatar">
        <h1>Pixelstrike56</h1>
        
        <div class="bio">
            <p>Bonjour ! 👋 Je commence à apprendre le <b>Python</b>, je suis au lycée en seconde et j'ai eu l'idée de me faire un site, et le voila la v1.</p>
            <div>
                <span class="badge">2MTNE</span>
                <span class="badge">Vers BAC PRO CIEL</span>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-config" onclick="toggleConfig()">
                <i class="fa-solid fa-laptop"></i> Ma Config PC
            </button>
            
            <div id="config-details">
                <b>Laptop :</b> Lenovo Thinkpad P52<br>
                <b>CPU :</b> Intel Core i7-8750H<br>
                <b>GPU :</b> Nvidia Quadro P1000<br>
                <b>OS :</b> EndeavourOS
            </div>

            <a href="https://artbysekai.fr" target="_blank" class="btn btn-friend">
                Site de mon collègue 
            </a>
        </div>
    </div>

    <script>
        function toggleConfig() {
            var details = document.getElementById("config-details");
            if (details.style.display === "block") {
                details.style.display = "none";
            } else {
                details.style.display = "block";
            }
        }
    </script>
</body>
</html>
